<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiBot Dashboard</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #2d1b69 50%, #1a0f3a 100%);
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Header Styles */
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .header-icon {
            width: 3rem;
            height: 3rem;
            background: linear-gradient(135deg, #a855f7 0%, #2563eb 100%);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .header-icon svg {
            width: 1.5rem;
            height: 1.5rem;
            color: white;
        }

        .header-content h1 {
            font-size: 2.25rem;
            font-weight: bold;
            background: linear-gradient(to right, #a78bfa, #f472b6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-content p {
            color: #cbd5e1;
            font-size: 1.125rem;
            margin-top: 0.25rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(45, 27, 105, 0.3);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .stat-card-label {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .stat-card-value {
            font-size: 1.875rem;
            font-weight: bold;
            color: white;
        }

        /* Info Cards Row */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .info-card {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .info-card-emoji {
            font-size: 1.5rem;
        }

        .info-card-content h3 {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 400;
            margin-bottom: 0.25rem;
        }

        .info-card-content p {
            color: white;
            font-weight: bold;
            font-size: 1.125rem;
        }

        /* Commands Section */
        .commands-section {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .commands-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            margin-bottom: 1.5rem;
        }

        .search-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(55, 65, 81, 0.5);
            border: 1px solid rgba(100, 116, 139, 0.5);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .search-input:focus {
            outline: none;
            border-color: #a855f7;
            background: rgba(55, 65, 81, 0.7);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 0.75rem;
            color: #94a3b8;
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .filter-label {
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(71, 85, 105, 0.5);
            color: #cbd5e1;
        }

        .category-btn.active {
            background: #a855f7;
            color: white;
        }

        .category-btn:hover {
            background: rgba(71, 85, 105, 0.7);
        }

        /* Commands Grid */
        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 1rem;
            margin-bottom: 1.5rem;
        }

        .commands-grid::-webkit-scrollbar {
            width: 8px;
        }

        .commands-grid::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.3);
            border-radius: 4px;
        }

        .commands-grid::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 4px;
        }

        .commands-grid::-webkit-scrollbar-thumb:hover {
            background: #d946ef;
        }

        .command-card {
            background: rgba(55, 65, 81, 0.3);
            border: 1px solid rgba(100, 116, 139, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .command-card:hover {
            background: rgba(55, 65, 81, 0.6);
            border-color: #a855f7;
        }

        .command-card-header {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .command-name {
            font-weight: bold;
            color: white;
            transition: color 0.3s ease;
        }

        .command-card:hover .command-name {
            color: #d8b4fe;
        }

        .command-description {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .command-category {
            display: inline-block;
            margin-top: 0.75rem;
            font-size: 0.75rem;
            background: rgba(168, 85, 247, 0.3);
            color: #d8b4fe;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }

        .command-card-icon {
            color: #94a3b8;
            transition: color 0.3s ease;
        }

        .command-card:hover .command-card-icon {
            color: #a855f7;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid rgba(168, 85, 247, 0.3);
            border-radius: 50%;
            border-top-color: #a855f7;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #94a3b8;
            margin-top: 1rem;
        }

        /* Footer */
        .footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(71, 85, 105, 0.3);
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        /* Results Counter */
        .results-counter {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(71, 85, 105, 0.3);
            color: #94a3b8;
            font-size: 0.875rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content h1 {
                font-size: 1.875rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .commands-grid {
                grid-template-columns: 1fr;
            }

            .category-filter {
                gap: 0.5rem;
            }

            .category-btn {
                padding: 0.375rem 0.75rem;
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Dashboard = () => {
            const [stats, setStats] = useState(null);
            const [commands, setCommands] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetchStats();
                fetchCommands();
                const interval = setInterval(fetchStats, 5000);
                return () => clearInterval(interval);
            }, []);

            const fetchStats = async () => {
                try {
                    const res = await fetch('/api/stats');
                    const data = await res.json();
                    setStats(data);
                } catch (error) {
                    console.error('Error fetching stats:', error);
                }
            };

            const fetchCommands = async () => {
                try {
                    const res = await fetch('/api/commands');
                    const data = await res.json();
                    setCommands(data);
                    setLoading(false);
                } catch (error) {
                    console.error('Error fetching commands:', error);
                    setLoading(false);
                }
            };

            const filteredCommands = commands.filter(cmd => {
                const matchesSearch = cmd.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                     cmd.description.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesCategory = selectedCategory === 'all' || cmd.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            const categories = stats?.categories || [];

            const formatUptime = (ms) => {
                if (!ms) return '0s';
                const seconds = Math.floor((ms / 1000) % 60);
                const minutes = Math.floor((ms / (1000 * 60)) % 60);
                const hours = Math.floor((ms / (1000 * 60 * 60)) % 24);
                const days = Math.floor(ms / (1000 * 60 * 60 * 24));
                
                if (days > 0) return `${days}d ${hours}h`;
                if (hours > 0) return `${hours}h ${minutes}m`;
                if (minutes > 0) return `${minutes}m ${seconds}s`;
                return `${seconds}s`;
            };

            return (
                <div className="dashboard-container">
                    {/* Header */}
                    <div className="header">
                        <div className="header-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                            </svg>
                        </div>
                        <div className="header-content">
                            <h1>MultiBot Dashboard</h1>
                            <p>Your comprehensive Discord bot control center</p>
                        </div>
                    </div>

                    {/* Stats Grid */}
                    {stats && (
                        <>
                            <div className="stats-grid">
                                <div className="stat-card">
                                    <div className="stat-card-header">
                                        <span className="stat-card-label">📦 Total Commands</span>
                                    </div>
                                    <div className="stat-card-value">{stats.totalCommands}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-card-header">
                                        <span className="stat-card-label">👥 Users Served</span>
                                    </div>
                                    <div className="stat-card-value">{stats.usersServed}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-card-header">
                                        <span className="stat-card-label">💬 Commands Executed</span>
                                    </div>
                                    <div className="stat-card-value">{stats.commandsExecuted}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-card-header">
                                        <span className="stat-card-label">⚡ Bot Latency</span>
                                    </div>
                                    <div className="stat-card-value">${stats.ping}ms</div>
                                </div>
                            </div>

                            <div className="info-grid">
                                <div className="info-card">
                                    <div className="info-card-emoji">🟢</div>
                                    <div className="info-card-content">
                                        <h3>Status</h3>
                                        <p>{stats.botStatus}</p>
                                    </div>
                                </div>
                                <div className="info-card">
                                    <div className="info-card-emoji">⏱️</div>
                                    <div className="info-card-content">
                                        <h3>Uptime</h3>
                                        <p>{formatUptime(stats.uptime)}</p>
                                    </div>
                                </div>
                                <div className="info-card">
                                    <div className="info-card-emoji">🏰</div>
                                    <div className="info-card-content">
                                        <h3>Guilds</h3>
                                        <p>{stats.guilds}</p>
                                    </div>
                                </div>
                            </div>
                        </>
                    )}

                    {/* Commands Section */}
                    <div className="commands-section">
                        <h2 className="commands-title">🔍 Command Browser</h2>
                        
                        {/* Search */}
                        <div className="search-container">
                            <svg className="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            <input
                                type="text"
                                className="search-input"
                                placeholder="Search commands..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>

                        {/* Category Filter */}
                        <div className="category-filter">
                            <span className="filter-label">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                                </svg>
                                Filter
                            </span>
                            <button
                                className={`category-btn ${selectedCategory === 'all' ? 'active' : ''}`}
                                onClick={() => setSelectedCategory('all')}
                            >
                                All ({commands.length})
                            </button>
                            {categories.map((cat) => (
                                <button
                                    key={cat.name}
                                    className={`category-btn ${selectedCategory === cat.name ? 'active' : ''}`}
                                    onClick={() => setSelectedCategory(cat.name)}
                                >
                                    {cat.name} ({cat.count})
                                </button>
                            ))}
                        </div>

                        {/* Commands Grid */}
                        {loading ? (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p className="loading-text">Loading commands...</p>
                            </div>
                        ) : (
                            <>
                                <div className="commands-grid">
                                    {filteredCommands.length > 0 ? (
                                        filteredCommands.map((cmd) => (
                                            <div key={cmd.name} className="command-card">
                                                <div className="command-card-header">
                                                    <div className="command-name">/{cmd.name}</div>
                                                    <svg className="command-card-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                        <polyline points="9 18 15 12 9 6"></polyline>
                                                    </svg>
                                                </div>
                                                <p className="command-description">{cmd.description}</p>
                                                <span className="command-category">{cmd.category}</span>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="no-results" style={{ gridColumn: '1 / -1' }}>
                                            No commands found
                                        </div>
                                    )}
                                </div>

                                <div className="results-counter">
                                    Showing {filteredCommands.length} of {commands.length} commands
                                </div>
                            </>
                        )}
                    </div>

                    {/* Footer */}
                    <div className="footer">
                        <p>MultiBot © 2024 | Dashboard updates in real-time</p>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
